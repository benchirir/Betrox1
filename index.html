<body>
    <div class="casino-container">
        <!-- Auth Modal -->
        <div class="auth-modal" id="authModal">
            <div class="auth-box">
                <h2>VELVET SPIN</h2>
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">LOGIN</button>
                    <button class="auth-tab" data-tab="register">REGISTER</button>
                </div>
                <form id="loginForm" class="auth-form active">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>

                <form id="registerForm" class="auth-form">

        <!-- Game Interface -->
        <div class="game-header">
            <div class="brand">

                <span>PREMIER</span>
            </div>
            <div class="user-section">
                <span id="usernameDisplay"></span>
                <button class="logout-btn" id="logoutBtn">LOGOUT</button>
            </div>
            <div class="chip-bank">
                <div class="balance-label">BALANCE</div>
                <div class="balance-value" id="balanceDisplay">1,000</div>
            </div>
        </div>

        <div class="wheel-area">
            <div class="wheel-container">
                <canvas id="rouletteWheel" width="400" height="400"></canvas>
                <div class="wheel-center" id="winningNumberDisplay">—</div>
            </div>
            <div class="last-results">
                <div style="color:#bcad90;">LAST</div>
                <div class="result-badge" id="historyContainer"></div>
            </div>
        </div>

        <div class="betting-panel">
            <div class="chip-rack">
                <div class="chip active-chip" data-value="1">1</div>
                <div class="chip" data-value="5">5</div>
                <div class="chip" data-value="25">25</div>
                <div class="chip" data-value="100">100</div>
            </div>

            <div class="bet-grid">
                <div class="numbers-row" id="numbersRow"></div>
                <div class="numbers-row">
                    <div class="bet-btn special" data-bet="1st12">1st 12</div>
                    <div class="bet-btn special" data-bet="2nd12">2nd 12</div>
                    <div class="bet-btn special" data-bet="3rd12">3rd 12</div>
                    <div class="bet-btn special" data-bet="red">RED</div>
                    <div class="bet-btn special" data-bet="black">BLACK</div>
                    <div class="bet-btn special" data-bet="even">EVEN</div>

                </div>

        <div class="action-bar">
            <div class="bet-info" id="currentBetDisplay">BET: 0</div>

                <div class="clear-btn" id="clearBetsBtn">CLEAR</div>
                <button class="spin-btn" id="spinBtn">SPIN</button>
            </div>
        </div>
        <div id="gameMessage" class="message-area">PLACE YOUR BETS</div>

        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">GAMES</span>
                <span class="stat-value" id="gamesPlayed">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">WAGERED</span>
                <span class="stat-value" id="totalWagered">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">WON</span>
                <span class="stat-value" id="totalWon">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">NET</span>
                <span class="stat-value" id="netProfit">0</span>
            </div>

        <div class="history-section">
            <div class="history-title">RECENT SPINS</div>
            <div class="history-list" id="spinHistoryList"></div>
        </div>

    <script>
        // ============================================
        // COMPLETE ROULETTE CASINO - ALL IN ONE
        // ============================================

        // ---------- DATABASE (LocalStorage) ----------
        class Database {
            constructor() {
                this.init();
            }

            init() {
                if (!localStorage.getItem('roulette_players')) {
                    localStorage.setItem('roulette_players', JSON.stringify([]));
                }
                if (!localStorage.getItem('roulette_games')) {
                    localStorage.setItem('roulette_games', JSON.stringify([]));
                }
            }

            // Player operations
            createPlayer(username, password) {
                const players = this.getPlayers();
                const existing = players.find(p => p.username === username);
                if (existing) throw new Error('Username already exists');
                
                const player = {
                    id: Date.now() + Math.random(),
                    username,
                    password: this.hashPassword(password),
                    balance: 1000,
                    totalWagered: 0,
                    totalWon: 0,
                    gamesPlayed: 0,
                    createdAt: new Date().toISOString()
                };
                
                players.push(player);
                localStorage.setItem('roulette_players', JSON.stringify(players));
                return { ...player, password: undefined };
            }

            findPlayer(username) {
                const players = this.getPlayers();
                return players.find(p => p.username === username);
            }

            getPlayer(id) {
                const players = this.getPlayers();
                const player = players.find(p => p.id == id);
                if (player) {
                    return { ...player, password: undefined };
                }
                return null;
            }

            updatePlayer(id, updates) {
                const players = this.getPlayers();
                const index = players.findIndex(p => p.id == id);
                if (index !== -1) {
                    players[index] = { ...players[index], ...updates };
                    localStorage.setItem('roulette_players', JSON.stringify(players));
                    return { ...players[index], password: undefined };
                }
                return null;
            }

            getPlayers() {
                return JSON.parse(localStorage.getItem('roulette_players') || '[]');
            }

            // Game operations
            createGame(gameData) {
                const games = this.getGames();
                const game = {
                    id: Date.now() + Math.random(),
                    ...gameData,
                    createdAt: new Date().toISOString()
                };
                games.push(game);
                localStorage.setItem('roulette_games', JSON.stringify(games));
                return game;
            }

            getPlayerGames(playerId, limit = 20) {
                const games = this.getGames();
                return games
                    .filter(g => g.playerId == playerId)
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
                    .slice(0, limit);
            }

            getGames() {
                return JSON.parse(localStorage.getItem('roulette_games') || '[]');
            }

            hashPassword(password) {
                // Simple hash for demo (in production use proper crypto)
                let hash = 0;
                for (let i = 0; i < password.length; i++) {
                    hash = ((hash << 5) - hash) + password.charCodeAt(i);
                    hash = hash & hash;
                }
                return hash.toString(36);
            }

            verifyPassword(player, password) {
                return player.password === this.hashPassword(password);
            }
        }

        // ---------- GAME ENGINE ----------
        const WHEEL_NUMBERS = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5,
            24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];

        const RED_NUMBERS = new Set([32, 19, 21, 25, 34, 27, 36, 30, 23, 5, 16, 1, 14, 9, 18, 7, 12, 3]);

        class GameEngine {
            static getNumberColor(num) {
                if (num === 0) return 'green';
                return RED_NUMBERS.has(num) ? 'red' : 'black';
            }

            static generateWinningNumber() {
                // Provably fair simulation using crypto
                const array = new Uint32Array(1);
                crypto.getRandomValues(array);
                const index = array[0] % WHEEL_NUMBERS.length;
                return WHEEL_NUMBERS[index];
            }

            static calculatePayout(bets, winningNumber) {
                const winColor = this.getNumberColor(winningNumber);
                const isEven = winningNumber !== 0 && winningNumber % 2 === 0;
                const dozen = winningNumber === 0 ? null : Math.ceil(winningNumber / 12);
                
                let totalPayout = 0;
                const betResults = [];
                
                for (const bet of bets) {
                    let multiplier = 0;
                    let isWin = false;
                    
                    switch (bet.betType) {
                        case 'straight':
                            if (parseInt(bet.betValue) === winningNumber) {
                                multiplier = 35;
                                isWin = true;
                            }
                            break;
                        case 'red':
                            if (winColor === 'red') { multiplier = 1; isWin = true; }
                            break;
                        case 'black':
                            if (winColor === 'black') { multiplier = 1; isWin = true; }
                            break;
                        case 'even':
                            if (isEven) { multiplier = 1; isWin = true; }
                            break;
                        case 'odd':
                            if (!isEven && winningNumber !== 0) { multiplier = 1; isWin = true; }
                            break;
                        case 'dozen':
                            if (winningNumber !== 0 && parseInt(bet.betValue) === dozen) {
                                multiplier = 2;
                                isWin = true;
                            }
                            break;
                    }
                    
                    const payout = isWin ? bet.amount * (multiplier + 1) : 0;
                    totalPayout += payout;
                    
                    betResults.push({ ...bet, isWin, multiplier, payout });
                }
                
                return { totalPayout, betResults, winningNumber, color: winColor };
            }

            static validateBets(bets, balance) {
                const total = bets.reduce((sum, b) => sum + b.amount, 0);
                if (total <= 0) throw new Error('Invalid bet amount');
                if (total > balance) throw new Error('Insufficient balance');
                for (const bet of bets) {
                    if (bet.amount < 1) throw new Error('Minimum bet is 1');
                }
                return total;
            }
        }

        // ---------- MAIN APPLICATION ----------
        const db = new Database();
        let currentUser = null;
        let balance = 0;
        let bets = new Map();
        let selectedChipValue = 1;
        let currentBetTotal = 0;
        let spinning = false;
        let spinAnimation = null;
        let currentWheelRotation = 0;
        let lastNumbers = [22, 7, 0];

        // DOM Elements
        const authModal = document.getElementById('authModal');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authError = document.getElementById('authError');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const currentBetDisplay = document.getElementById('currentBetDisplay');
        const gameMessage = document.getElementById('gameMessage');
        const historyContainer = document.getElementById('historyContainer');
        const winDisplay = document.getElementById('winningNumberDisplay');
        const spinBtn = document.getElementById('spinBtn');
        const clearBtn = document.getElementById('clearBetsBtn');
        const canvas = document.getElementById('rouletteWheel');
        const ctx = canvas.getContext('2d');
        const gamesPlayedEl = document.getElementById('gamesPlayed');
        const totalWageredEl = document.getElementById('totalWagered');
        const totalWonEl = document.getElementById('totalWon');
        const netProfitEl = document.getElementById('netProfit');
        const spinHistoryList = document.getElementById('spinHistoryList');

        // Helper functions
        function formatNumber(num) {
            return num.toLocaleString();
        }

        function updateUI() {
            balanceDisplay.textContent = formatNumber(balance);
            currentBetDisplay.textContent = `BET: ${formatNumber(currentBetTotal)}`;
        }

        function updateStats() {
            if (currentUser) {
                gamesPlayedEl.textContent = currentUser.gamesPlayed || 0;
                totalWageredEl.textContent = formatNumber(currentUser.totalWagered || 0);
                totalWonEl.textContent = formatNumber(currentUser.totalWon || 0);
                netProfitEl.textContent = formatNumber((currentUser.totalWon || 0) - (currentUser.totalWagered || 0));
            }
        }

        function loadHistory() {
            if (!currentUser) return;
            
            const games = db.getPlayerGames(currentUser.id, 10);
            spinHistoryList.innerHTML = '';
            
            games.forEach(game => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const winClass = game.winAmount > 0 ? 'style="color: #4CAF50;"' : '';
                item.innerHTML = `
                    <span>${new Date(game.createdAt).toLocaleTimeString()} - ${game.winningNumber}</span>
                    <span ${winClass}>${game.winAmount > 0 ? '+' : ''}${formatNumber(game.winAmount)}</span>
                `;
                spinHistoryList.appendChild(item);
            });
        }

        function drawWheel(rotationAngle = 0) {
            const width = 400, height = 400;
            canvas.width = width; canvas.height = height;
            const centerX = width/2, centerY = height/2;
            const radius = Math.min(width, height) * 0.42;
            const segments = WHEEL_NUMBERS.length;
            const angleStep = (Math.PI * 2) / segments;
            
            ctx.clearRect(0, 0, width, height);
            
            ctx.shadowColor = '#000000aa';
            ctx.shadowBlur = 16;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius+14, 0, 2*Math.PI);
            ctx.fillStyle = '#2f2616';
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.strokeStyle = '#b89b5e';
            ctx.lineWidth = 5;
            ctx.stroke();
            
            ctx.shadowBlur = 10;
            for (let i = 0; i < segments; i++) {
                const startAngle = i * angleStep + rotationAngle;
                const endAngle = startAngle + angleStep;
                const number = WHEEL_NUMBERS[i];
                const color = GameEngine.getNumberColor(number);
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                
                let fillColor;
                if (color === 'red') fillColor = '#b32424';
                else if (color === 'black') fillColor = '#262626';
                else fillColor = '#1f6e3f';
                
                ctx.fillStyle = fillColor;
                ctx.fill();
                ctx.strokeStyle = '#dac292';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleStep/2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "bold 16px 'Segoe UI', sans-serif";
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 6;
                ctx.fillStyle = '#f5efdb';
                ctx.fillText(number.toString(), radius*0.72, 0);
                ctx.restore();
            }
            
            ctx.shadowBlur = 14;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 38, 0, 2*Math.PI);
            ctx.fillStyle = '#3f321e';
            ctx.fill();
            ctx.strokeStyle = '#dbb976';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function addHistory(num) {
            lastNumbers.unshift(num);
            if (lastNumbers.length > 3) lastNumbers.pop();
            renderHistory();
        }

        function renderHistory() {
            historyContainer.innerHTML = '';
            lastNumbers.forEach(n => {
                const bubble = document.createElement('div');
                bubble.className = `number-bubble ${GameEngine.getNumberColor(n)}-bg`;
                bubble.textContent = n;
                historyContainer.appendChild(bubble);
            });
        }

        function highlightBets() {
            document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('bet-highlight'));
            
            for (let key of bets.keys()) {
                if (key.includes(':')) {
                    const [type, val] = key.split(':');
                    if (type === 'straight') {
                        document.querySelectorAll(`.bet-btn[data-number="${val}"]`).forEach(el => el.classList.add('bet-highlight'));
                    } else if (type === 'dozen') {
                        const map = { '1': '1st12', '2': '2nd12', '3': '3rd12' };
                        document.querySelectorAll(`.bet-btn[data-bet="${map[val]}"]`).forEach(el => el.classList.add('bet-highlight'));
                    }
                } else {
                    document.querySelectorAll(`.bet-btn[data-bet="${key}"]`).forEach(el => el.classList.add('bet-highlight'));
                }
            }
        }

        function placeBet(betType, betValue = null) {
            if (spinning) {
                gameMessage.textContent = 'WAIT FOR SPIN TO FINISH';
                return false;
            }
            
            if (balance < selectedChipValue) {
                gameMessage.textContent = 'INSUFFICIENT BALANCE';
                return false;
            }
            
            const key = betValue !== null ? `${betType}:${betValue}` : betType;
            const current = bets.get(key) || 0;
            bets.set(key, current + selectedChipValue);
            currentBetTotal += selectedChipValue;
            balance -= selectedChipValue;
            
            updateUI();
            highlightBets();
            gameMessage.textContent = `BET ${selectedChipValue} ON ${betType.toUpperCase()} ${betValue || ''}`;
            return true;
        }

        function clearBets() {
            if (spinning) return;
            
            for (let amount of bets.values()) {
                balance += amount;
            }
            bets.clear();
            currentBetTotal = 0;
            document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('bet-highlight'));
            updateUI();
            gameMessage.textContent = 'BETS CLEARED';
        }

        function spin() {
            if (spinning) return;
            if (currentBetTotal === 0) {
                gameMessage.textContent = 'PLACE A BET FIRST';
                return;
            }
            
            spinning = true;
            spinBtn.disabled = true;
            clearBtn.style.pointerEvents = 'none';
            gameMessage.textContent = '🎲 SPINNING... 🎲';
            
            // Prepare bets
            const betsArray = [];
            for (let [key, amount] of bets.entries()) {
                if (key.includes(':')) {
                    const [type, val] = key.split(':');
                    betsArray.push({ betType: type, betValue: val, amount });
                } else {
                    betsArray.push({ betType: key, betValue: null, amount });
                }
            }
            
            // Generate result
            const winningNumber = GameEngine.generateWinningNumber();
            const result = GameEngine.calculatePayout(betsArray, winningNumber);
            
            // Save game to database
            if (currentUser) {
                const game = db.createGame({
                    playerId: currentUser.id,
                    betAmount: currentBetTotal,
                    winAmount: result.totalPayout,
                    winningNumber: result.winningNumber,
                    bets: betsArray
                });
                
                // Update player stats
                const updatedPlayer = db.updatePlayer(currentUser.id, {
                    balance: balance + result.totalPayout,
                    totalWagered: (currentUser.totalWagered || 0) + currentBetTotal,
                    totalWon: (currentUser.totalWon || 0) + result.totalPayout,
                    gamesPlayed: (currentUser.gamesPlayed || 0) + 1
                });
                
                currentUser = updatedPlayer;
                balance = updatedPlayer.balance;
            } else {
                balance += result.totalPayout;
            }
            
            // Animate wheel
            const spinPower = 1440 + Math.floor(Math.random() * 1080);
            const targetRotation = currentWheelRotation + spinPower;
            const duration = 3000;
            const startTime = performance.now();
            const startRot = currentWheelRotation;
            
            const winningIndex = WHEEL_NUMBERS.indexOf(result.winningNumber);
            const segmentAngle = 360 / WHEEL_NUMBERS.length;
            const targetSegmentOffset = (winningIndex * segmentAngle) + (segmentAngle/2);
            const finalRotation = (Math.round((targetRotation - targetSegmentOffset) / 360) * 360) + targetSegmentOffset;
            
            function animateSpin(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentRot = startRot + (finalRotation - startRot) * easeOut;
                currentWheelRotation = currentRot % 360;
                drawWheel(currentWheelRotation * Math.PI / 180);
                
                if (progress < 1) {
                    spinAnimation = requestAnimationFrame(animateSpin);
                } else {
                    currentWheelRotation = finalRotation % 360;
                    drawWheel(currentWheelRotation * Math.PI / 180);
                    
                    spinning = false;
                    spinBtn.disabled = false;
                    clearBtn.style.pointerEvents = '';
                    
                    winDisplay.textContent = result.winningNumber;
                    addHistory(result.winningNumber);
                    
                    bets.clear();
                    currentBetTotal = 0;
                    document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('bet-highlight'));
                    
                    let message = `NUMBER ${result.winningNumber} · ${result.color.toUpperCase()}`;
                    if (result.totalPayout > 0) {
                        message += ` · WIN ${formatNumber(result.totalPayout)}!`;
                    } else {
                        message += ` · NO WIN`;
                    }
                    gameMessage.textContent = message;
                    
                    updateUI();
                    updateStats();
                    loadHistory();
                }
            }
            
            spinAnimation = requestAnimationFrame(animateSpin);
        }

        // Auth functions
        function login(username, password) {
            const player = db.findPlayer(username);
            if (!player) throw new Error('Invalid username or password');
            if (!db.verifyPassword(player, password)) throw new Error('Invalid username or password');
            
            currentUser = { ...player, password: undefined };
            balance = player.balance;
            
            usernameDisplay.textContent = currentUser.username;
            authModal.classList.add('hidden');
            
            updateUI();
            updateStats();
            loadHistory();
            gameMessage.textContent = `WELCOME BACK, ${username}!`;
        }

        function register(username, password, confirmPassword) {
            if (password !== confirmPassword) throw new Error('Passwords do not match');
            if (password.length < 6) throw new Error('Password must be at least 6 characters');
            
            const player = db.createPlayer(username, password);
            currentUser = player;
            balance = player.balance;
            
            usernameDisplay.textContent = currentUser.username;
            authModal.classList.add('hidden');
            
            updateUI();
            updateStats();
            gameMessage.textContent = `WELCOME, ${username}!`;
        }

        function logout() {
            currentUser = null;
            balance = 0;
            bets.clear();
            currentBetTotal = 0;
            
            authModal.classList.remove('hidden');
            usernameDisplay.textContent = '';
            
            document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('bet-highlight'));
            updateUI();
            gameMessage.textContent = 'PLACE YOUR BETS';
        }

        // Initialize game board
        function initGameBoard() {
            const numbersRow = document.getElementById('numbersRow');
            for (let i = 0; i <= 36; i++) {
                const btn = document.createElement('div');
                btn.className = `bet-btn ${GameEngine.getNumberColor(i)}-bg`;
                btn.setAttribute('data-number', i);
                btn.textContent = i;
                btn.addEventListener('click', () => placeBet('straight', i.toString()));
                numbersRow.appendChild(btn);
            }
            
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active-chip'));
                    chip.classList.add('active-chip');
                    selectedChipValue = parseInt(chip.dataset.value);
                });
            });
            
            document.querySelectorAll('[data-bet]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const bet = btn.dataset.bet;
                    if (bet === '1st12') placeBet('dozen', '1');
                    else if (bet === '2nd12') placeBet('dozen', '2');
                    else if (bet === '3rd12') placeBet('dozen', '3');
                    else placeBet(bet);
                });
            });
            
            clearBtn.addEventListener('click', clearBets);
            spinBtn.addEventListener('click', spin);
        }

        // Event listeners
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                login(username, password);
                authError.textContent = '';
            } catch (error) {
                authError.textContent = error.message;
            }
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirmPassword').value;
            
            try {
                register(username, password, confirm);
                authError.textContent = '';
            } catch (error) {
                authError.textContent = error.message;
            }
        });

        logoutBtn.addEventListener('click', logout);

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
                authError.textContent = '';
            });
        });

        // Check for existing session
        const savedUserId = localStorage.getItem('currentUserId');
        if (savedUserId) {
            const player = db.getPlayer(savedUserId);
            if (player) {
                currentUser = player;
                balance = player.balance;
                usernameDisplay.textContent = currentUser.username;
                authModal.classList.add('hidden');
                updateUI();
                updateStats();
                loadHistory();
                gameMessage.textContent = `WELCOME BACK, ${player.username}!`;
            }
        }

        // Save session on changes
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                localStorage.setItem('currentUserId', currentUser.id);
            } else {
                localStorage.removeItem('currentUserId');
            }
            if (spinAnimation) cancelAnimationFrame(spinAnimation);
        });

        // Initialize
        drawWheel(0);
        renderHistory();
        initGameBoard();

        // Auto-login for demo (optional - uncomment to skip login)
        // setTimeout(() => {
        //     if (!currentUser) {
        //         try {
        //             register('demo', 'demo123', 'demo123');
        //         } catch (e) {
        //             login('demo', 'demo123');
        //         }
        //     }
        // }, 100);
    </script>
</body>
