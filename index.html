<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 VELVET SPIN · LIVE CASINO</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body{
            background:radial-gradient(circle at 20% 30%,#0b0e14,#030507);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:'Segoe UI',system-ui,sans-serif;
            padding:10px;
        }
        .container{
            max-width:1000px;
            width:100%;
            background:rgba(10,15,22,0.9);
            backdrop-filter:blur(10px);
            border:1px solid #d4af3740;
            border-radius:30px;
            padding:20px;
        }
        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
            flex-wrap:wrap;
            gap:10px;
        }
        .logo{color:#e7d9b8;font-size:1.8rem;font-weight:300;letter-spacing:4px;}
        .balance-box{
            background:#1a1f2b;
            border:1px solid #d4af37;
            border-radius:30px;
            padding:8px 20px;
        }
        .balance{color:#f3e7c9;font-size:1.8rem;font-weight:600;}
        .wallet-actions{display:flex;gap:8px;}
        .wallet-btn{
            background:#2a3a2a;
            border:1px solid #5f8f5f;
            color:#c8e6c8;
            padding:8px 16px;
            border-radius:20px;
            cursor:pointer;
            font-size:0.8rem;
            font-weight:600;
        }
        .live-players{
            background:#0d111a;
            border-radius:20px;
            padding:10px;
            margin:10px 0;
            border:1px solid #5f503a;
        }
        .players-title{
            color:#bcad90;
            font-size:0.7rem;
            margin-bottom:5px;
            display:flex;
            justify-content:space-between;
        }
        .players-list{
            display:flex;
            gap:15px;
            overflow-x:auto;
            padding:5px 0;
        }
        .fake-player{
            display:flex;
            align-items:center;
            gap:5px;
            background:#1a1f2b;
            padding:5px 12px;
            border-radius:20px;
            border-left:3px solid;
            animation:pulse 2s infinite;
        }
        @keyframes pulse{
            0%,100%{opacity:0.7;}
            50%{opacity:1;}
        }
        .wheel-section{
            display:flex;
            justify-content:center;
            gap:20px;
            margin:15px 0;
            flex-wrap:wrap;
        }
        .wheel-container{
            position:relative;
            width:250px;
            height:250px;
        }
        #wheel{
            width:100%;
            height:100%;
            border-radius:50%;
            box-shadow:0 0 0 4px #2c2416,0 0 0 8px #4a3e2b,0 10px 30px #000;
        }
        .wheel-center{
            position:absolute;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            width:55px;height:55px;
            background:radial-gradient(circle at 30% 30%,#e9dbc1,#6b5d44);
            border-radius:50%;
            border:2px solid #c9aa5f;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
            font-size:22px;
        }
        .stats-box{
            background:#0d111a;
            border-radius:15px;
            padding:15px;
            min-width:150px;
        }
        .stat-row{
            display:flex;
            justify-content:space-between;
            color:#bcad90;
            font-size:0.8rem;
            margin:5px 0;
        }
        .bets-panel{
            background:#0b1018;
            border-radius:25px;
            padding:20px;
            margin-top:15px;
        }
        .chips{
            display:flex;
            justify-content:center;
            gap:12px;
            margin-bottom:20px;
        }
        .chip{
            width:55px;height:55px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            font-size:1.2rem;
            box-shadow:0 6px 0 #2f261a,0 4px 10px #000;
            border:2px solid #e9d49e;
            cursor:pointer;
            background:radial-gradient(circle at 30% 28%,#f9efd1,#b59d6b);
        }
        .chip.active{transform:scale(1.1);box-shadow:0 4px 0 #2f261a,0 6px 15px gold;}
        .chip[data-val="1"]{background:radial-gradient(circle at 30% 28%,#f0f0ff,#7a8db0);}
        .chip[data-val="5"]{background:radial-gradient(circle at 30% 28%,#ffdbdb,#b15252);}
        .chip[data-val="25"]{background:radial-gradient(circle at 30% 28%,#d0f0c0,#2f854f);}
        .chip[data-val="100"]{background:radial-gradient(circle at 30% 28%,#1f1f2e,#0e0e1a);color:#eedbba;}
        .bet-grid{display:flex;flex-direction:column;gap:8px;}
        .bet-row{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;}
        .bet-btn{
            min-width:50px;height:45px;
            background:#19212b;
            border:1px solid #71613e;
            border-radius:12px;
            color:#e3d7bd;
            font-weight:600;
            font-size:1rem;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:inset 0 0 4px #000,0 3px 0 #0c0f14;
            cursor:pointer;
            padding:0 8px;
        }
        .bet-btn.special{background:#1f2a24;min-width:70px;font-size:0.8rem;}
        .bet-btn.active{background:#3f4d3b!important;border-color:#e4c27a!important;}
        .action-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:20px;
        }
        .spin-btn{
            background:radial-gradient(circle at 30% 20%,#e7cd91,#a5833e);
            border:none;
            border-bottom:5px solid #5f431b;
            color:#1a1c0e;
            font-weight:800;
            font-size:1.8rem;
            padding:10px 35px;
            border-radius:40px;
            cursor:pointer;
        }
        .spin-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .modal{
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:#000000e0;
            display:none;
            align-items:center;
            justify-content:center;
            z-index:1000;
        }
        .modal.show{display:flex;}
        .modal-content{
            background:#1a1f2b;
            border:1px solid #d4af37;
            border-radius:20px;
            padding:25px;
            max-width:350px;
            width:90%;
        }
        .modal-title{color:#e7d9b8;margin-bottom:20px;text-align:center;}
        .modal-input{
            width:100%;
            background:#0b1018;
            border:1px solid #5a4e3a;
            padding:12px;
            border-radius:10px;
            color:#e7d9b8;
            margin:10px 0;
        }
        .modal-btn{
            width:100%;
            background:#d4af37;
            border:none;
            padding:12px;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
        }
        .close-btn{
            color:#bcad90;
            text-align:center;
            margin-top:15px;
            cursor:pointer;
        }
        .message{
            color:#e0cba5;
            text-align:center;
            margin:10px 0;
            min-height:24px;
        }
        .last-nums{display:flex;gap:5px;}
        .num-badge{
            width:35px;height:35px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            color:#fff;
        }
        .red{background:#b32424;}
        .black{background:#262626;}
        .green{background:#1f6e3f;}
        .chat-message{
            color:#a99877;
            font-size:0.7rem;
            margin-left:10px;
            animation:fade 3s;
        }
        @keyframes fade{
            0%{opacity:1;}
            70%{opacity:1;}
            100%{opacity:0;}
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">🎰 VELVET SPIN</div>
        <div class="balance-box">
            <span style="color:#bcad90;font-size:0.7rem;">BALANCE</span>
            <div class="balance" id="balance">1,000</div>
        </div>
        <div class="wallet-actions">
            <button class="wallet-btn" onclick="showModal('deposit')">💳 DEPOSIT</button>
            <button class="wallet-btn" onclick="showModal('withdraw')">💸 WITHDRAW</button>
        </div>
    </div>

    <!-- Live Players -->
    <div class="live-players">
        <div class="players-title">
            <span>🔴 LIVE PLAYERS: <span id="playerCount">247</span></span>
            <span id="chatMessage" class="chat-message"></span>
        </div>
        <div class="players-list" id="playersList"></div>
    </div>

    <!-- Wheel Section -->
    <div class="wheel-section">
        <div class="wheel-container">
            <canvas id="wheel" width="300" height="300"></canvas>
            <div class="wheel-center" id="winNum">—</div>
        </div>
        <div class="stats-box">
            <div class="stat-row"><span>LAST</span><div class="last-nums" id="history"></div></div>
            <div class="stat-row"><span>GAMES</span><span id="gamesPlayed">0</span></div>
            <div class="stat-row"><span>WAGERED</span><span id="totalWagered">0</span></div>
            <div class="stat-row"><span>WON</span><span id="totalWon">0</span></div>
            <div class="stat-row"><span>HOT NUMBERS</span><span id="hotNumbers">17,32,5</span></div>
        </div>
    </div>

    <!-- Betting Panel -->
    <div class="bets-panel">
        <div class="chips">
            <div class="chip active" data-val="1">1</div>
            <div class="chip" data-val="5">5</div>
            <div class="chip" data-val="25">25</div>
            <div class="chip" data-val="100">100</div>
        </div>
        <div class="bet-grid">
            <div class="bet-row" id="numRow"></div>
            <div class="bet-row">
                <div class="bet-btn special" data-bet="1st12">1st12</div>
                <div class="bet-btn special" data-bet="2nd12">2nd12</div>
                <div class="bet-btn special" data-bet="3rd12">3rd12</div>
                <div class="bet-btn special" data-bet="red">RED</div>
                <div class="bet-btn special" data-bet="black">BLACK</div>
                <div class="bet-btn special" data-bet="even">EVEN</div>
                <div class="bet-btn special" data-bet="odd">ODD</div>
            </div>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <div style="color:#dac29c;" id="betDisplay">BET: 0</div>
        <div style="display:flex;gap:10px;">
            <button class="wallet-btn" onclick="clearBets()">CLEAR</button>
            <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
        </div>
    </div>
    <div class="message" id="message">PLACE YOUR BETS</div>
</div>

<!-- Deposit Modal -->
<div class="modal" id="depositModal">
    <div class="modal-content">
        <div class="modal-title">💳 DEPOSIT FUNDS</div>
        <input type="number" class="modal-input" id="depositAmount" placeholder="Amount" min="10" value="100">
        <div style="color:#bcad90;font-size:0.7rem;">Quick: 
            <span style="cursor:pointer;margin:0 5px;" onclick="setDeposit(50)">50</span>
            <span style="cursor:pointer;margin:0 5px;" onclick="setDeposit(100)">100</span>
            <span style="cursor:pointer;margin:0 5px;" onclick="setDeposit(500)">500</span>
        </div>
        <button class="modal-btn" onclick="deposit()">DEPOSIT</button>
        <div class="close-btn" onclick="hideModal('deposit')">Cancel</div>
    </div>
</div>

<!-- Withdraw Modal -->
<div class="modal" id="withdrawModal">
    <div class="modal-content">
        <div class="modal-title">💸 WITHDRAW FUNDS</div>
        <input type="number" class="modal-input" id="withdrawAmount" placeholder="Amount" min="10">
        <div style="color:#bcad90;font-size:0.7rem;">Available: <span id="availableBalance">0</span></div>
        <button class="modal-btn" onclick="withdraw()">WITHDRAW</button>
        <div class="close-btn" onclick="hideModal('withdraw')">Cancel</div>
    </div>
</div>

<script>
// ========== GAME STATE ==========
const WHEEL = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const REDS = new Set([32,19,21,25,34,27,36,30,23,5,16,1,14,9,18,7,12,3]);
let balance = 1000, betTotal = 0, bets = new Map(), chipVal = 1, spinning = false;
let history = [17,32,5], hotNums = [17,32,5], spinCount = 0;
let fakePlayers = [], chatMessages = [
    "Player238 won 500!", "VIP_King placed 1000 bet!", "Lucky777 hit 35x!",
    "New high roller joined!", "Someone just withdrew 5000!", "Hot streak! 🔥",
    "Player999: nice!", "Big win for Guest2384!", "CasinoGOD: gg"
];

// ========== FAKE PLAYERS ==========
function generateFakePlayers() {
    const names = ['VIP_', 'Pro_', 'Lucky', 'King', 'Queen', 'Ace', 'Max', 'Leo', 'Nova', 'Zen'];
    const count = Math.floor(Math.random() * 50) + 200;
    document.getElementById('playerCount').textContent = count;
    
    fakePlayers = [];
    for(let i=0;i<8;i++){
        const name = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*999);
        const bet = Math.floor(Math.random()*500)+10;
        const colors = ['#d4af37','#e03a3a','#4CAF50','#2196F3'];
        fakePlayers.push({name,bet,color:colors[Math.floor(Math.random()*colors.length)]});
    }
    
    const list = document.getElementById('playersList');
    list.innerHTML = fakePlayers.map(p => 
        `<div class="fake-player" style="border-left-color:${p.color}">
            <span style="color:#e7d9b8;">${p.name}</span>
            <span style="color:#bcad90;font-size:0.7rem;">💰${p.bet}</span>
        </div>`
    ).join('');
}

function updateFakePlayers() {
    setInterval(() => {
        fakePlayers.forEach((p,i) => {
            p.bet = Math.max(10, p.bet + Math.floor(Math.random()*200)-50);
        });
        const list = document.getElementById('playersList');
        list.innerHTML = fakePlayers.map(p => 
            `<div class="fake-player" style="border-left-color:${p.color}">
                <span style="color:#e7d9b8;">${p.name}</span>
                <span style="color:#bcad90;font-size:0.7rem;">💰${Math.floor(p.bet)}</span>
            </div>`
        ).join('');
        
        if(Math.random()>0.7){
            const msg = chatMessages[Math.floor(Math.random()*chatMessages.length)];
            document.getElementById('chatMessage').textContent = msg;
            setTimeout(()=>document.getElementById('chatMessage').textContent='',4000);
        }
        document.getElementById('playerCount').textContent = Math.floor(Math.random()*50)+200;
    },3000);
}

// ========== WHEEL ==========
function drawWheel(rot=0){
    const c=document.getElementById('wheel'),ctx=c.getContext('2d');
    const w=300,h=300,cx=150,cy=150,r=110,seg=WHEEL.length,step=2*Math.PI/seg;
    ctx.clearRect(0,0,w,h);
    for(let i=0;i<seg;i++){
        const sa=i*step+rot,ea=sa+step,num=WHEEL[i];
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
        let col;const isRed=REDS.has(num);
        if(num===0)col='#1f6e3f';else col=isRed?'#b32424':'#262626';
        ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#dac292';ctx.lineWidth=1;ctx.stroke();
        ctx.save();ctx.translate(cx,cy);ctx.rotate(sa+step/2);
        ctx.font="bold 14px Arial";ctx.fillStyle='#f5efdb';ctx.fillText(num,r*0.7,5);ctx.restore();
    }
    ctx.beginPath();ctx.arc(cx,cy,35,0,2*Math.PI);
    ctx.fillStyle='#3f321e';ctx.fill();ctx.strokeStyle='#dbb976';ctx.lineWidth=3;ctx.stroke();
}

// ========== BETTING ==========
function placeBet(type,val=null){
    if(spinning){message('Wait for spin!');return false;}
    if(balance<chipVal){message('Insufficient balance!');return false;}
    const key=val!==null?`${type}:${val}`:type;
    bets.set(key,(bets.get(key)||0)+chipVal);
    betTotal+=chipVal;balance-=chipVal;
    updateUI();highlightBets();
    message(`Bet ${chipVal} on ${type}${val?' '+val:''}`);
    return true;
}
function clearBets(){
    if(spinning)return;
    for(let v of bets.values())balance+=v;
    bets.clear();betTotal=0;
    document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));
    updateUI();message('Bets cleared');
}
function highlightBets(){
    document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));
    for(let k of bets.keys()){
        if(k.includes(':')){
            const [t,v]=k.split(':');
            if(t==='straight') document.querySelectorAll(`[data-num="${v}"]`).forEach(b=>b.classList.add('active'));
            else if(t==='dozen'){
                const m={'1':'1st12','2':'2nd12','3':'3rd12'};
                document.querySelectorAll(`[data-bet="${m[v]}"]`).forEach(b=>b.classList.add('active'));
            }
        }else document.querySelectorAll(`[data-bet="${k}"]`).forEach(b=>b.classList.add('active'));
    }
}

// ========== SPIN (UNPREDICTABLE) ==========
let rot=0,anim=null;
function spin(){
    if(spinning||betTotal===0){message(betTotal===0?'Place a bet!':'Wait...');return;}
    spinning=true;spinBtn.disabled=true;
    message('🎲 SPINNING... 🎲');
    
    // Generate bets array
    const betsArr=[];
    for(let [k,v] of bets){
        if(k.includes(':')){
            const [t,val]=k.split(':');
            betsArr.push({type:t,value:val,amount:v});
        }else betsArr.push({type:k,value:null,amount:v});
    }
    
    // UNPREDICTABLE WINNING NUMBER - Uses multiple entropy sources
    let winNum;
    const now=Date.now(), perf=performance.now();
    const entropy=(now%37)+(perf*100%37)+(Math.random()*37)+(spinCount%7);
    // Weighted randomness - slightly favors hot numbers but still unpredictable
    if(Math.random()<0.15 && hotNums.length>0){
        winNum=hotNums[Math.floor(Math.random()*hotNums.length)];
    }else{
        winNum=WHEEL[Math.floor(Math.abs(entropy*now)%WHEEL.length)];
    }
    
    // Calculate payout
    const color=winNum===0?'green':(REDS.has(winNum)?'red':'black');
    const isEven=winNum!==0&&winNum%2===0;
    const dozen=winNum===0?null:Math.ceil(winNum/12);
    let payout=0;
    
    for(let b of betsArr){
        let mult=0,win=false;
        if(b.type==='straight'&&parseInt(b.value)===winNum){mult=35;win=true;}
        else if(b.type==='red'&&color==='red'){mult=1;win=true;}
        else if(b.type==='black'&&color==='black'){mult=1;win=true;}
        else if(b.type==='even'&&isEven){mult=1;win=true;}
        else if(b.type==='odd'&&!isEven&&winNum!==0){mult=1;win=true;}
        else if(b.type==='dozen'&&winNum!==0&&parseInt(b.value)===dozen){mult=2;win=true;}
        if(win)payout+=b.amount*(mult+1);
    }
    
    // Update hot numbers
    history.unshift(winNum);if(history.length>8)history.pop();
    const freq={};history.forEach(n=>freq[n]=(freq[n]||0)+1);
    hotNums=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>parseInt(e[0]));
    
    // Animate
    const targetRot=rot+1440+Math.floor(Math.random()*1080);
    const winIdx=WHEEL.indexOf(winNum);
    const segAngle=360/WHEEL.length;
    const finalRot=Math.round((targetRot-(winIdx*segAngle+segAngle/2))/360)*360+(winIdx*segAngle+segAngle/2);
    const start=performance.now(),startRot=rot,dur=3500+Math.random()*1000;
    
    function animate(now){
        const prog=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-prog,3);
        rot=(startRot+(finalRot-startRot)*ease)%360;
        drawWheel(rot*Math.PI/180);
        if(prog<1)anim=requestAnimationFrame(animate);
        else{
            rot=finalRot%360;drawWheel(rot*Math.PI/180);
            spinning=false;spinBtn.disabled=false;
            document.getElementById('winNum').textContent=winNum;
            
            // Update stats
            balance+=payout;
            const wagered=parseInt(localStorage.getItem('wagered')||0)+betTotal;
            const won=parseInt(localStorage.getItem('won')||0)+payout;
            const games=parseInt(localStorage.getItem('games')||0)+1;
            localStorage.setItem('wagered',wagered);
            localStorage.setItem('won',won);
            localStorage.setItem('games',games);
            spinCount++;
            
            bets.clear();betTotal=0;
            document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));
            updateUI();
            updateHistory();
            message(`${winNum} ${color.toUpperCase()} · ${payout>0?'WIN '+payout+'!':'NO WIN'}`);
            generateFakePlayers();
        }
    }
    anim=requestAnimationFrame(animate);
}

// ========== UI UPDATES ==========
function updateUI(){
    document.getElementById('balance').textContent=balance.toLocaleString();
    document.getElementById('betDisplay').textContent=`BET: ${betTotal}`;
    document.getElementById('gamesPlayed').textContent=localStorage.getItem('games')||0;
    document.getElementById('totalWagered').textContent=(localStorage.getItem('wagered')||0).toLocaleString();
    document.getElementById('totalWon').textContent=(localStorage.getItem('won')||0).toLocaleString();
    document.getElementById('hotNumbers').textContent=hotNums.join(',');
}
function updateHistory(){
    const h=document.getElementById('history');
    h.innerHTML=history.slice(0,3).map(n=>{
        const c=n===0?'green':(REDS.has(n)?'red':'black');
        return `<div class="num-badge ${c}">${n}</div>`;
    }).join('');
}
function message(m){document.getElementById('message').textContent=m;}

// ========== DEPOSIT/WITHDRAW ==========
function showModal(t){
    document.getElementById(t+'Modal').classList.add('show');
    if(t==='withdraw')document.getElementById('availableBalance').textContent=balance;
}
function hideModal(t){document.getElementById(t+'Modal').classList.remove('show');}
function setDeposit(v){document.getElementById('depositAmount').value=v;}
function deposit(){
    const amt=parseFloat(document.getElementById('depositAmount').value);
    if(amt>=10){balance+=amt;updateUI();hideModal('deposit');message(`Deposited ${amt}`);}
}
function withdraw(){
    const amt=parseFloat(document.getElementById('withdrawAmount').value);
    if(amt>=10 && amt<=balance){balance-=amt;updateUI();hideModal('withdraw');message(`Withdrawn ${amt}`);}
}

// ========== INIT ==========
function init(){
    // Build number buttons
    const row=document.getElementById('numRow');
    for(let i=0;i<=36;i++){
        const b=document.createElement('div');
        const c=i===0?'green':(REDS.has(i)?'red':'black');
        b.className=`bet-btn ${c}`;
        b.style.background=i===0?'#1f6e3f':(REDS.has(i)?'#b32424':'#262626');
        b.setAttribute('data-num',i);
        b.textContent=i;
        b.onclick=()=>placeBet('straight',i.toString());
        row.appendChild(b);
    }
    // Special bets
    document.querySelectorAll('[data-bet]').forEach(b=>{
        b.onclick=()=>{
            const bet=b.dataset.bet;
            if(bet==='1st12')placeBet('dozen','1');
            else if(bet==='2nd12')placeBet('dozen','2');
            else if(bet==='3rd12')placeBet('dozen','3');
            else placeBet(bet);
        };
    });
    // Chips
    document.querySelectorAll('.chip').forEach(c=>{
        c.onclick=()=>{
            document.querySelectorAll('.chip').forEach(ch=>ch.classList.remove('active'));
            c.classList.add('active');
            chipVal=parseInt(c.dataset.val);
        };
    });
    // Load saved
    const saved=localStorage.getItem('balance');
    if(saved)balance=parseFloat(saved);
    updateUI();updateHistory();drawWheel();
    generateFakePlayers();updateFakePlayers();
    setInterval(()=>saveState(),5000);
}
function saveState(){
    localStorage.setItem('balance',balance);
    localStorage.setItem('history',JSON.stringify(history));
}
window.onload=init;
</script>
</body>
</html>
